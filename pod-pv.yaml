apiVersion: v1
kind: Pod
metadata:
  name: myapp
  labels:
    app: my-app

spec:
  nodeSelector:
    topology.kubernetes.io/zone: ap-south-1a

  containers:
  - name: myapp
    image: nginx

    ports:
      - containerPort: 80

    volumeMounts:
      - mountPath: "/usr/share/nginx/html"
        name: my-vol

  volumes:
    - name: my-vol
      persistentVolumeClaim:
        claimName: mypvc