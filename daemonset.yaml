apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-ds
spec:
  selector:
    matchLabels:
      app: ds-app   

  template:
    metadata:
      labels:
        app: ds-app   

    spec:
      containers:
      - name: nginx
        image: nginx


---
apiVersion: v1
kind: Service
metadata:
  name: my-ds-svc
spec:
  type: NodePort
  selector:
    app: ds-app   
  ports:
  - port: 80
    targetPort: 80